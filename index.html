const catColors = {
  food: 'cat-food',
  beverage: 'cat-beverage',
  lifestyle: 'cat-lifestyle',
  consumer: 'cat-consumer',
  health: 'cat-health',
  finance: 'cat-finance',
  pets: 'cat-pets'
};

const tbody = document.getElementById('tbody');
const cardsEl = document.getElementById('cards');
const searchInput = document.getElementById('search');
const countEl = document.getElementById('count');
const filterBtns = document.querySelectorAll('.filter-btn');
const langToggle = document.getElementById('lang-toggle');
const lblEn = document.getElementById('lbl-en');
const lblTh = document.getElementById('lbl-th');

let activeCategory = 'all';
let sortCol = null;
let sortAsc = true;
let lang = 'en';

function t(key) { return i18n[lang][key]; }

function render() {
  const q = searchInput.value.toLowerCase();
  let visible = 0;

  tbody.querySelectorAll('tr').forEach(row => {
    const text = row.dataset.search;
    const cats = row.dataset.cats.split(',');
    const show = (!q || text.includes(q)) && (activeCategory === 'all' || cats.includes(activeCategory));
    row.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  cardsEl.querySelectorAll('.card').forEach(card => {
    const text = card.dataset.search;
    const cats = card.dataset.cats.split(',');
    const show = (!q || text.includes(q)) && (activeCategory === 'all' || cats.includes(activeCategory));
    card.classList.toggle('hidden', !show);
  });

  countEl.textContent = t('countText')(visible, surveys.length);
}

function badgesHTML(categories) {
  return categories.map(c =>
    `<span class="badge ${catColors[c] || ''}">${c}</span>`
  ).join('');
}

function getTitle(s) { return lang === 'th' ? s.title_th : s.title; }
function getDesc(s) { return lang === 'th' ? s.desc_th : s.desc; }

function searchText(s) {
  return [s.title, s.title_th, s.person, s.program, s.desc, s.desc_th, ...s.categories].join(' ').toLowerCase();
}

function buildTable(data) {
  tbody.innerHTML = '';
  cardsEl.innerHTML = '';

  data.forEach(s => {
    const st = searchText(s);
    const cats = s.categories.join(',');
    const badges = badgesHTML(s.categories);
    const title = getTitle(s);
    const desc = getDesc(s);

    const tr = document.createElement('tr');
    tr.dataset.search = st;
    tr.dataset.cats = cats;
    tr.innerHTML = `
      <td class="title">${title}</td>
      <td class="person">${s.person}</td>
      <td class="program">${s.program}</td>
      <td class="desc">${desc}</td>
      <td>${badges}</td>
      <td>${s.time || t('noTime')}</td>
      <td>${s.incentive || t('noTime')}</td>
      <td><a class="link-btn" href="${s.link}" target="_blank" rel="noopener">${t('openBtn')}</a></td>
    `;
    tbody.appendChild(tr);

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.search = st;
    card.dataset.cats = cats;
    card.innerHTML = `
      <div class="card-title">${title}</div>
      <div class="card-meta">
        <span>${s.person}</span>
        <span>${s.program}</span>
        ${s.time ? `<span>${s.time}</span>` : ''}
      </div>
      <div class="card-desc">${desc}</div>
      <div class="card-footer">
        <div class="card-badges">${badges}</div>
        ${s.incentive ? `<div class="card-incentive">${s.incentive}</div>` : ''}
        <a class="link-btn" href="${s.link}" target="_blank" rel="noopener">${t('openBtnCard')}</a>
      </div>
    `;
    cardsEl.appendChild(card);
  });

  render();
}

function applyLang() {
  document.getElementById('page-title').textContent = t('pageTitle');
  document.getElementById('page-subtitle').textContent = t('pageSubtitle');
  searchInput.placeholder = t('searchPlaceholder');

  // Update table headers
  document.querySelectorAll('thead th').forEach(th => {
    const label = th.dataset[lang];
    if (label) {
      const arrow = th.querySelector('.sort-arrow');
      th.textContent = label + ' ';
      if (arrow) th.appendChild(arrow);
    }
  });

  // Toggle active label
  lblEn.classList.toggle('active', lang === 'en');
  lblTh.classList.toggle('active', lang === 'th');
  langToggle.classList.toggle('th', lang === 'th');

  buildTable(surveys);
}

function toggleLang() {
  lang = lang === 'en' ? 'th' : 'en';
  applyLang();
}

langToggle.addEventListener('click', toggleLang);
lblEn.addEventListener('click', () => { if (lang !== 'en') toggleLang(); });
lblTh.addEventListener('click', () => { if (lang !== 'th') toggleLang(); });

// Sorting
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }

    const sorted = [...surveys].sort((a, b) => {
      const key = col === 'title' && lang === 'th' ? 'title_th' : col;
      let va = (a[key] || '').toLowerCase();
      let vb = (b[key] || '').toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted'));
    th.classList.add('sorted');
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
    buildTable(sorted);
  });
});

searchInput.addEventListener('input', render);

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    render();
  });
});

applyLang();
</script>
</body>
</html>
